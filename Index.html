<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetEarn - Premium Link Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa3;
            --secondary: #03a9f4;
            --bg: #05070a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* Animated Background Glow */
        .glow { position: fixed; width: 300px; height: 300px; background: var(--primary); filter: blur(150px); opacity: 0.1; z-index: -1; top: 10%; left: 10%; }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card);
            backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 28px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 163, 0.5); }
        .tagline { color: #888; font-size: 0.85rem; margin-bottom: 30px; }

        /* Input & Buttons */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-left: 10px; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%; padding: 16px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); border-radius: 14px;
            color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 163, 0.1); }

        .btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 14px; color: #000; font-weight: 800;
            cursor: pointer; font-size: 1rem; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 255, 163, 0.3); }

        /* Timer & Steps */
        .step-info { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px; display: inline-block; font-size: 0.75rem; border: 1px solid var(--border); margin-bottom: 15px; }
        #timer-box { font-size: 4.5rem; font-weight: 800; color: var(--primary); margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        /* Ad Spaces */
        .ad-slot { width: 100%; height: 100px; background: rgba(255,255,255,0.02); border: 1px dashed var(--border); margin: 15px 0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #555; }

        /* Result Area */
        #result-box { display: none; margin-top: 25px; padding: 15px; background: rgba(0, 255, 163, 0.05); border-radius: 14px; border: 1px solid rgba(0, 255, 163, 0.2); }
        #short-url { color: var(--primary); word-break: break-all; font-weight: bold; font-size: 0.9rem; margin: 10px 0; }

        .section { display: none; }
        .active { display: block; animation: fadeInUp 0.5s ease forwards; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="glow"></div>

<div class="container">
    <div class="logo">Get<span>Earn</span></div>
    <div class="tagline">Cloud Link Protection & Monetization</div>

    <div id="home" class="section active">
        <div class="input-group">
            <label>TARGET URL</label>
            <input type="text" id="target" placeholder="Paste Mediafire/YT link...">
        </div>
        <button class="btn" onclick="generate()">GENERATE PREMIUM LINK</button>

        <div id="result-box">
            <p style="font-size: 0.75rem; color: #888;">Your Monetized Link:</p>
            <div id="short-url"></div>
            <button class="btn" style="padding: 10px; font-size: 0.8rem;" onclick="copyLink()">COPY LINK</button>
        </div>
    </div>

    <div id="step1" class="section">
        <div class="step-badge step-info">SECURITY CHECK 1/2</div>
        <div class="ad-slot">BANNER_AD_TOP</div>
        <div id="timer-box">10</div>
        <div class="ad-slot">BANNER_AD_BOTTOM</div>
        <button id="btn1" class="btn" style="display:none" onclick="startStep2()">CONTINUE TO STEP 2</button>
    </div>

    <div id="step2" class="section">
        <div class="step-badge step-info">FINAL VERIFICATION 2/2</div>
        <div class="ad-slot">BANNER_AD_TOP</div>
        <div id="timer-box-2" style="font-size: 4.5rem; font-weight: 800; color: var(--primary); margin: 20px 0;">10</div>
        <div class="ad-slot">BANNER_AD_BOTTOM</div>
        <button id="btn2" class="btn" style="display:none" onclick="finishRedirect()">GET FILE NOW</button>
    </div>
</div>

<script>
    let finalUrl = "";

    function generate() {
        let input = document.getElementById('target').value;
        if(!input) return alert("Please enter a link!");
        
        let id = Math.random().toString(36).substring(2, 8);
        let baseUrl = window.location.href.split('#')[0].split('?')[0];
        // Short URL format
        let combined = baseUrl + "?id=" + id + "#" + btoa(input);
        
        document.getElementById('short-url').innerText = combined;
        document.getElementById('result-box').style.display = "block";
    }

    function copyLink() {
        let text = document.getElementById('short-url').innerText;
        navigator.clipboard.writeText(text);
        alert("Link Copied!");
    }

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        if(params.has('id') && window.location.hash) {
            finalUrl = atob(window.location.hash.substring(1));
            document.getElementById('home').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            runTimer(10, 'timer-box', 'btn1');
        }
    }

    function runTimer(sec, displayId, btnId) {
        let time = sec;
        let itv = setInterval(() => {
            time--;
            document.getElementById(displayId).innerText = time;
            if(time <= 0) {
                clearInterval(itv);
                document.getElementById(displayId).style.display = 'none';
                document.getElementById(btnId).style.display = 'block';
            }
        }, 1000);
    }

    function startStep2() {
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        runTimer(10, 'timer-box-2', 'btn2');
    }

    function finishRedirect() {
        window.location.href = finalUrl;
    }
</script>

</body>
</html>
